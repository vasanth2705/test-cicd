name: CD POC

on:
  push:
    tags:
      - "**"
    branches:
      - test

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # IMPORTANT: required to check commit history

      # ----------------------------
      # Deploy to TEST (on main push)
      # ----------------------------
      - name: Deploy to TEST
        if: contains(github.ref, 'test')
        run: |
          echo "🚀 Deploying to TEST environment"
          echo "Commit: ${{ github.sha }}"

      # ----------------------------
      # Validate tag is from main
      # ----------------------------
      - name: Verify tag is from main branch
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          echo "Checking if tag commit exists in main..."

          git fetch origin main

          if git branch -r --contains ${{ github.sha }} | grep -q "origin/main"; then
            echo "Tag is from main branch"
          else
            echo "Tag is NOT from main branch"
            exit 1
          fi

      # ----------------------------
      # Deploy to PROD (only valid tag)
      # ----------------------------
      - name: Deploy to PROD
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          echo "🔥 Deploying to PROD environment"
          echo "Tag: ${{ github.ref_name }}"
