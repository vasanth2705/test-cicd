name: Send Dataset Access Email

on:
  workflow_dispatch:

jobs:
  send-email:
    runs-on: ubuntu-latest

    steps:
      - name: Send Email Notification
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}

          subject: Dataset Access Granted

          to: vasanthguru2728@gmail.com
          from: vasanthguru75@gmail.com

          body: |
            Hello, Good Morning!

            Regards,
            Vasanth
